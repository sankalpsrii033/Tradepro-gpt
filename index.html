<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade GPT Pro Level 4.1</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
    margin:0;
    background:#070b14;
    color:white;
    font-family:Arial;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:6px;
}

button{
    background:#22c55e;
    font-weight:bold;
    cursor:pointer;
}

button:hover{background:#16a34a;}

.output{
    background:black;
    padding:15px;
    height:420px;
    overflow:auto;
    border-radius:10px;
}

iframe{
    width:100%;
    height:420px;
    border:none;
    border-radius:10px;
}

.badge{
    padding:5px 10px;
    border-radius:6px;
    display:inline-block;
    margin-top:10px;
}
.green{background:#16a34a;}
.yellow{background:#ca8a04;}
.red{background:#dc2626;}

/* modal */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.modal-content{
    background:#111827;
    width:420px;
    margin:10% auto;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
🔥 TRADE GPT PRO LEVEL 4.1 TERMINAL
<button onclick="openSettings()" style="float:right;background:#3b82f6;">Settings</button>
</header>

<div class="container">

<!-- INPUT -->
<div class="card">
<h3>📊 Trade Input</h3>

<input id="stock" placeholder="Stock (NVDA / AAPL / TCS)">
<input id="capital" placeholder="Capital ₹">
<input id="risk" placeholder="Risk %">

<select id="mode">
<option value="A++">A++ Deep Analysis</option>
<option value="A+">A+ Balanced</option>
<option value="B">B Quick Scan</option>
</select>

<button onclick="runAnalysis()">RUN 15 ENGINE ANALYSIS</button>

<div id="signalBox"></div>

</div>

<!-- OUTPUT -->
<div class="card">
<h3>🧠 AI Institutional Report</h3>
<div class="output" id="output">Waiting...</div>
</div>

<!-- CHART -->
<div class="card" style="grid-column:span 2;">
<h3>📈 TradingView Chart</h3>
<iframe id="chart"
src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=15&theme=dark">
</iframe>
</div>

</div>

<!-- SETTINGS -->
<div class="modal" id="settingsModal">
<div class="modal-content">

<h3>🔌 OpenRouter Settings</h3>

<input id="apiKey" type="password" placeholder="API Key">
<input id="model" placeholder="Model">

<button onclick="saveSettings()">Save</button>
<button onclick="testAPI()">Test API</button>

</div>
</div>

<script>

// ------------------ STORAGE ------------------
function load(){
    document.getElementById("apiKey").value = localStorage.getItem("or_key") || "";
    document.getElementById("model").value = localStorage.getItem("or_model") || "deepseek/deepseek-r1:free";
}
load();

function saveSettings(){
    localStorage.setItem("or_key",document.getElementById("apiKey").value);
    localStorage.setItem("or_model",document.getElementById("model").value);
    alert("Saved");
}

// ------------------ SETTINGS ------------------
function openSettings(){
    document.getElementById("settingsModal").style.display="block";
}

// ------------------ SYMBOL MAP ------------------
function getSymbol(input){
    input = input.toUpperCase();

    if(input.includes("NSE")) return "NSE:"+input;
    if(input.includes("TCS") || input.includes("INFY")) return "NSE:"+input;

    return "NASDAQ:"+input;
}

// ------------------ SIGNAL ENGINE ------------------
function getSignal(score){
    if(score > 85) return "🟢 STRONG BUY";
    if(score > 70) return "🟢 BUY";
    if(score > 55) return "🟡 HOLD";
    if(score > 45) return "🟡 STRONG HOLD";
    if(score > 30) return "🔴 SELL";
    return "🔴 STRONG SELL";
}

// ------------------ OPENROUTER ------------------
async function callAI(prompt){

let key = localStorage.getItem("or_key");
let model = localStorage.getItem("or_model");

if(!key){
    return "❌ Error connect to OpenRouter API";
}

try{
let res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
        "Authorization":"Bearer "+key,
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        model:model,
        messages:[
            {
                role:"system",
                content:"You are institutional trading AI using 15 engine analysis system."
            },
            {role:"user", content:prompt}
        ]
    })
});

let data = await res.json();

if(data.error) return "❌ Error connect to OpenRouter API";

return data.choices[0].message.content;

}catch(e){
return "❌ Error connect to OpenRouter API";
}

}

// ------------------ MAIN ------------------
async function runAnalysis(){

let stock = document.getElementById("stock").value;
let capital = document.getElementById("capital").value;
let risk = document.getElementById("risk").value;
let mode = document.getElementById("mode").value;

let score = Math.floor(Math.random()*100);

let signal = getSignal(score);

// UPDATE CHART
document.getElementById("chart").src =
"https://s.tradingview.com/widgetembed/?symbol="+getSymbol(stock)+"&interval=15&theme=dark";

// SIGNAL UI
document.getElementById("signalBox").innerHTML =
`<div class="badge ${score>70?'green':score>45?'yellow':'red'}">
Confluence Score: ${score}/100<br>${signal}
</div>`;

// AI PROMPT
let prompt = `
Stock: ${stock}
Capital: ${capital}
Risk: ${risk}
Mode: ${mode}

Give 15 engine institutional analysis:
- Market Structure
- Liquidity
- Sweep
- MSS
- FVG
- VWAP
- Volume
- Trend

Return trade plan + reasoning.
`;

let result = await callAI(prompt);

document.getElementById("output").innerHTML =
marked.parse(result);

}

</script>

</body>
</html>
