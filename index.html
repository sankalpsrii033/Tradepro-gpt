<!DOCTYPE html>
<html lang="en" data-theme="obsidian">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NOVA AI — Personal Intelligence</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --surface2: #141414;
            --surface3: #1c1c1c;
            --surface4: #242424;
            --text: #f0f0f0;
            --text2: #b0b0b0;
            --text3: #6a6a6a;
            --accent: #6C5CE7;
            --accent2: #00C6FF;
            --accent3: #a78bfa;
            --green: #00E5A8;
            --red: #ff4757;
            --orange: #ffa502;
            --yellow: #ffd43b;
            --glow: rgba(108, 92, 231, 0.5);
            --glow2: rgba(0, 198, 255, 0.4);
            --glow3: rgba(167, 139, 250, 0.35);
            --radius: 18px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --radius-xl: 24px;
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --font: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
            --sidebar-w: 310px;
            --topbar-h: 56px;
            --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        }
        [data-theme="cyber-blue"] {
            --accent: #00C6FF;
            --accent2: #0099ff;
            --accent3: #66d9ff;
            --glow: rgba(0, 198, 255, 0.5);
            --glow2: rgba(0, 153, 255, 0.4);
            --glow3: rgba(102, 217, 255, 0.35);
            --green: #00e5c8;
        }
        [data-theme="emerald"] {
            --accent: #00E5A8;
            --accent2: #00c896;
            --accent3: #5fffd9;
            --glow: rgba(0, 229, 168, 0.5);
            --glow2: rgba(0, 200, 150, 0.4);
            --glow3: rgba(95, 255, 217, 0.35);
            --green: #00ffb3;
        }
        [data-theme="purple-neon"] {
            --accent: #b347ea;
            --accent2: #d46aff;
            --accent3: #e8a0ff;
            --glow: rgba(179, 71, 234, 0.55);
            --glow2: rgba(212, 106, 255, 0.45);
            --glow3: rgba(232, 160, 255, 0.4);
            --green: #c084fc;
        }
        [data-theme="rose-gold"] {
            --accent: #e8a87c;
            --accent2: #f4c2a1;
            --accent3: #f8d8c8;
            --glow: rgba(232, 168, 124, 0.5);
            --glow2: rgba(244, 194, 161, 0.4);
            --glow3: rgba(248, 216, 200, 0.35);
            --green: #f0c8a0;
        }
        [data-theme="solar"] {
            --accent: #ffa502;
            --accent2: #ff7f00;
            --accent3: #ffc048;
            --glow: rgba(255, 165, 2, 0.55);
            --glow2: rgba(255, 127, 0, 0.45);
            --glow3: rgba(255, 192, 72, 0.4);
            --green: #ffc048;
        }
        [data-theme="arctic"] {
            --accent: #7ec8e3;
            --accent2: #a0d8ef;
            --accent3: #c8e8f8;
            --glow: rgba(126, 200, 227, 0.45);
            --glow2: rgba(160, 216, 239, 0.35);
            --glow3: rgba(200, 232, 248, 0.3);
            --green: #b0e8f8;
        }
        [data-theme="midnight"] {
            --accent: #5b6abf;
            --accent2: #7b8cd0;
            --accent3: #a0aee0;
            --glow: rgba(91, 106, 191, 0.45);
            --glow2: rgba(123, 140, 208, 0.35);
            --glow3: rgba(160, 174, 224, 0.3);
            --green: #8fa0e0;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
            overscroll-behavior: none;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            position: relative;
            letter-spacing: -0.01em;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--noise);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.55;
        }
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.55;
        }
        #aurora {
            position: fixed;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(180px);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            animation: auroraFloat 22s ease-in-out infinite;
        }
        #aurora2 {
            position: fixed;
            width: 550px;
            height: 550px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, var(--accent2) 0%, transparent 70%);
            animation: auroraFloat2 26s ease-in-out infinite;
        }
        @keyframes auroraFloat {
            0%,
            100% {
                top: -250px;
                left: 8%;
            }
            25% {
                top: 35%;
                left: 65%;
            }
            50% {
                top: 72%;
                left: 25%;
            }
            75% {
                top: 18%;
                left: 75%;
            }
        }
        @keyframes auroraFloat2 {
            0%,
            100% {
                bottom: -220px;
                right: 8%;
            }
            25% {
                bottom: 55%;
                right: 55%;
            }
            50% {
                bottom: 18%;
                right: 18%;
            }
            75% {
                bottom: 65%;
                right: 65%;
            }
        }
        #app {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            height: 100%;
            background: rgba(13, 13, 13, 0.88);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform var(--transition), min-width var(--transition), width var(--transition);
            position: relative;
        }
        #sidebar.collapsed {
            transform: translateX(calc(var(--sidebar-w) * -1));
            min-width: 0;
            width: 0;
            border: none;
        }
        #sidebar-resize-handle {
            position: absolute;
            right: -3px;
            top: 0;
            bottom: 0;
            width: 6px;
            cursor: col-resize;
            z-index: 11;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #sidebar:hover #sidebar-resize-handle {
            opacity: 1;
        }
        .sidebar-header {
            padding: 20px 20px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 17px;
            letter-spacing: -0.5px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 10px 28px var(--glow);
            animation: logoPulse 3.5s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                box-shadow: 0 10px 28px var(--glow);
            }
            50% {
                box-shadow: 0 16px 40px var(--glow2), 0 0 70px var(--glow);
            }
        }
        .logo-text {
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-section {
            padding: 6px 16px;
            flex-shrink: 0;
        }
        .sidebar-section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text3);
            margin-bottom: 8px;
            padding: 0 4px;
            font-weight: 600;
        }
        .nova-mode-selector {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 8px;
        }
        .nova-mode-btn {
            padding: 11px 14px;
            border-radius: var(--radius-xs);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text2);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 500;
            text-align: left;
            transition: all var(--transition);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nova-mode-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text);
        }
        .nova-mode-btn.active {
            background: rgba(108, 92, 231, 0.15);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--glow), inset 0 0 20px rgba(108, 92, 231, 0.06);
        }
        .nova-mode-btn .mode-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .nova-mode-btn .mode-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .nova-mode-btn .mode-name {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .nova-mode-btn .mode-desc {
            font-size: 0.68rem;
            color: var(--text3);
            letter-spacing: 0;
        }
        .nova-mode-btn.active .mode-desc {
            color: var(--accent3);
        }
        .btn-new-chat {
            width: 100%;
            padding: 11px 16px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition);
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }
        .btn-new-chat:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
            transform: translateY(-1px);
        }
        .btn-new-chat:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        .tools-toggle-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 4px 0;
        }
        .tool-chip {
            padding: 6px 10px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: var(--text3);
            cursor: pointer;
            font-size: 0.7rem;
            font-family: var(--font);
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tool-chip:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text2);
            background: rgba(255, 255, 255, 0.07);
        }
        .tool-chip.active {
            background: rgba(108, 92, 231, 0.2);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px var(--glow);
        }
        .sidebar-chats {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 12px;
            scroll-behavior: smooth;
        }
        .sidebar-chats::-webkit-scrollbar {
            width: 3px;
        }
        .sidebar-chats::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }
        .chat-list-item {
            padding: 9px 12px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.83rem;
            color: var(--text2);
            margin-bottom: 2px;
            position: relative;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-list-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .chat-list-item.active {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
            font-weight: 500;
        }
        .chat-list-item .chat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--accent);
            opacity: 0.6;
        }
        .chat-list-item.active .chat-dot {
            opacity: 1;
            box-shadow: 0 0 10px var(--glow);
        }
        .chat-list-item .delete-chat-btn {
            position: absolute;
            right: 6px;
            opacity: 0;
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            border-radius: 4px;
            transition: opacity var(--transition);
        }
        .chat-list-item:hover .delete-chat-btn {
            opacity: 0.7;
        }
        .chat-list-item .delete-chat-btn:hover {
            opacity: 1;
            background: rgba(255, 71, 87, 0.12);
        }
        .sidebar-footer {
            padding: 10px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .sidebar-footer button {
            padding: 7px 11px;
            border-radius: var(--radius-xs);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text2);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .sidebar-footer button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            min-width: 0;
            background: transparent;
        }
        #topbar {
            height: var(--topbar-h);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 10px;
            background: rgba(5, 5, 5, 0.65);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 5;
        }
        .topbar-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: none;
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: var(--text);
        }
        .topbar-title {
            flex: 1;
            font-weight: 600;
            font-size: 0.93rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.02em;
        }
        .active-mode-badge {
            padding: 6px 13px;
            border-radius: 18px;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            color: var(--accent3);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #conversation {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 22px;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #conversation::-webkit-scrollbar {
            width: 4px;
        }
        #conversation::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
        }
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 18px;
            padding: 40px;
        }
        .welcome-logo {
            width: 90px;
            height: 90px;
            border-radius: 26px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 36px;
            color: #fff;
            box-shadow: 0 24px 70px var(--glow), 0 0 140px var(--glow2);
            animation: welcomePulse 5s ease-in-out infinite;
        }
        @keyframes welcomePulse {
            0%,
            100% {
                box-shadow: 0 24px 70px var(--glow), 0 0 140px var(--glow2);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 36px 90px var(--glow2), 0 0 200px var(--glow);
                transform: scale(1.04);
            }
        }
        .welcome-title {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 25%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome-subtitle {
            color: var(--text2);
            font-size: 0.95rem;
            max-width: 520px;
            line-height: 1.7;
        }
        .suggested-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
            justify-content: center;
            max-width: 620px;
        }
        .suggested-prompt {
            padding: 10px 18px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: var(--text2);
            cursor: pointer;
            font-size: 0.84rem;
            font-family: var(--font);
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .suggested-prompt:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 6px 24px var(--glow);
            transform: translateY(-2px);
        }
        .message {
            max-width: 82%;
            padding: 16px 20px;
            border-radius: var(--radius);
            animation: messageIn 0.38s var(--spring);
            position: relative;
            word-break: break-word;
            line-height: 1.72;
            font-size: 0.9rem;
            letter-spacing: -0.01em;
        }
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 10px 35px var(--glow);
        }
        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-bottom-left-radius: 6px;
            max-width: 88%;
        }
        .message .msg-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.7rem;
            color: var(--text3);
            letter-spacing: 0.03em;
            font-weight: 600;
        }
        .message .msg-timestamp {
            font-size: 0.66rem;
            opacity: 0.5;
            margin-top: 8px;
            letter-spacing: 0;
        }
        .message .msg-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity var(--transition);
            flex-wrap: wrap;
        }
        .message:hover .msg-actions {
            opacity: 1;
        }
        .msg-actions button {
            padding: 5px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.07);
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 0.7rem;
            font-family: var(--font);
            transition: all var(--transition);
        }
        .msg-actions button:hover {
            background: rgba(255, 255, 255, 0.14);
            color: var(--text);
        }
        .msg-content h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 16px 0 10px;
            letter-spacing: -0.03em;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }
        .msg-content h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 14px 0 8px;
            letter-spacing: -0.02em;
            color: #fff;
        }
        .msg-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 12px 0 6px;

            function analyzePromptComplexity(message) {
                const lower = message.toLowerCase();
                let scores = { academic: 0, programming: 0, deepReasoning: 0, length: message.length };
                for (const kw of ROUTING_PATTERNS.academic) {
                    if (lower.includes(kw)) scores.academic++;
                }
                for (const kw of ROUTING_PATTERNS.programming) {
                    if (lower.includes(kw)) scores.programming++;
                }
                for (const kw of ROUTING_PATTERNS.deepReasoning) {
                    if (lower.includes(kw)) scores.deepReasoning++;
                }
                if (scores.length > 300) scores.deepReasoning += 2;
                if (scores.length > 600) scores.deepReasoning += 3;
                return scores;
            }

            function getEffectiveModelConfig() {
                const chat = getCurrentChat();
                let targetTier = activeNovaMode;
                if (chat && chat.messages.length > 0) {
                    const lastUserMsg = [...chat.messages].reverse().find(m => m.role === 'user');
                    if (lastUserMsg) {
                        const scores = analyzePromptComplexity(lastUserMsg.content);
                        if (activeNovaMode === 'nova1' && (scores.deepReasoning >= 2 || scores.academic >= 3)) {
                            targetTier = 'hyperos';
                        }
                        if (activeNovaMode === 'hyperos' && scores.deepReasoning >= 4) {
                            targetTier = 'extent';
                        }
                    }
                }
                return CONFIG.models[targetTier] || CONFIG.models['nova1'];
            }

            // PARTICLES & AURORA
            // ═══════════════════════════════════════════
            function initParticles() {
                const ctx = particleCanvas.getContext('2d');
                let particles = [];
                const maxParticles = 55;

                function resize() {
                    particleCanvas.width = window.innerWidth;
                    particleCanvas.height = window.innerHeight;
                }
                resize();
                window.addEventListener('resize', resize);
                class Particle {
                    constructor() { this.reset(); }
                    reset() {
                        this.x = Math.random() * particleCanvas.width;
                        this.y = Math.random() * particleCanvas.height;
                        this.size = Math.random() * 1.6 + 0.4;
                        this.speedX = (Math.random() - 0.5) * 0.25;
                        this.speedY = (Math.random() - 0.5) * 0.25;
                        this.opacity = Math.random() * 0.45 + 0.08;
                        this.life = Math.random() * 350 + 180;
                        this.maxLife = this.life;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        this.life--;
                        if (this.life <= 0 || this.x < -30 || this.x > particleCanvas.width + 30 || this.y < -30 || this
                            .y > particleCanvas.height + 30) {
                            this.reset();
                            this.x = Math.random() * particleCanvas.width;
                            this.y = Math.random() * particleCanvas.height;
                            this.life = this.maxLife;
                        }
                    }
                    draw(ctx) {
                        const alpha = (this.life / this.maxLife) * this.opacity;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                        ctx.fill();
                    }
                }
                for (let i = 0; i < maxParticles; i++) particles.push(new Particle());

                function animate() {
                    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                    for (const p of particles) { p.update();
                        p.draw(ctx); }
                    requestAnimationFrame(animate);
                }
                animate();
                let mouseX = -1000,
                    mouseY = -1000;
                document.addEventListener('mousemove', (e) => { mouseX = e.clientX;
                    mouseY = e.clientY; });
                document.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 0) { mouseX = e.touches[0].clientX;
                        mouseY = e.touches[0].clientY; }
                });

                function updateAurora() {
                    const ax = mouseX / window.innerWidth * 100;
                    const ay = mouseY / window.innerHeight * 100;
                    auroraEl.style.transform = `translate(${ax*0.35}px,${ay*0.35}px)`;
                    aurora2El.style.transform = `translate(${-ax*0.25}px,${-ay*0.25}px)`;
                    requestAnimationFrame(updateAurora);
                }
                updateAurora();
            }

            // ═══════════════════════════════════════════
            // PREMIUM MARKDOWN RENDERER
            // ═══════════════════════════════════════════
            function renderMarkdown(text) {
                if (!text) return '';
                let html = text;
                const codeBlocks = [];
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                    const idx = codeBlocks.length;
                    codeBlocks.push({ lang: lang.trim(), code: code.trimEnd() });
                    return `%%CODEBLOCK_${idx}%%`;
                });
                const inlineCodes = [];
                html = html.replace(/`([^`]+)`/g, (match, code) => {
                    const idx = inlineCodes.length;
                    inlineCodes.push(code);
                    return `%%INLINECODE_${idx}%%`;
                });
                html = html.replace(
                    /^>\s*\*\*(INFO|WARNING|TIP|DANGER|NOTE):\*\*\s*(.+?)(?=\n\n|$)/gm,
                    (match, type, content) => {
                        const icons = { INFO: 'ℹ️', WARNING: '⚠️', TIP: '💡', DANGER: '🚫', NOTE: '📝' };
                        const cls = type.toLowerCase();
                        return `<div class="callout callout-${cls}"><span>${icons[type]||'📌'}</span><div>${content.trim()}</div></div>`;
                    });
                html = html.replace(
                    /<details>\s*<summary>(.+?)<\/summary>\s*([\s\S]*?)<\/details>/g,
                    '<div class="expandable"><summary>$1</summary><div class="expandable-content">$2</div></div>');
                html = html.replace(/^- \[([ x])\]\s+(.+)$/gm, (match, checked, content) => {
                    const checkMark = checked === 'x' ? '✓' : '';
                    return `<div class="checklist-item"><span class="check-box">${checkMark}</span><span>${content}</span></div>`;
                });
                html = html.replace(/(\|[^\n]+\|\n\|[-| :]+\|\n((?:\|[^\n]+\|\n?)*))/g, (match) => {
                    const rows = match.trim().split('\n');
                    if (rows.length < 2) return match;
                    let tableHtml = '<table>';
                    const headerCells = rows[0].split('|').filter(c => c.trim());
                    tableHtml += '<thead><tr>' + headerCells.map(c => `<th>${c.trim()}</th>`).join('') +
                        '</tr></thead>';
                    if (rows.length > 2) {
                        tableHtml += '<tbody>';
                        for (let i = 2; i < rows.length; i++) {
                            const cells = rows[i].split('|').filter(c => c.trim());
                            if (cells.length > 0) tableHtml += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join(
                                '') + '</tr>';
                        }
                        tableHtml += '</tbody>';
                    }
                    tableHtml += '</table>';
                    return tableHtml;
                });
                html = html.replace(/^---$/gm, '<hr class="divider">');
                html = html.replace(/^>\s?(.+)$/gm, '<blockquote>$1</blockquote>');
                html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
                html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
                html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
                html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
                html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
                html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
                html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
                html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
                html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
                html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                    '<a href="$2" target="_blank" style="color:var(--accent2);text-decoration:underline;text-underline-offset:3px;">$1</a>');
                html = html.replace(/%%INLINECODE_(\d+)%%/g, (match, idx) => {
                    return `<code>${escapeHtml(inlineCodes[parseInt(idx)])}</code>`;
                });
                html = html.replace(/%%CODEBLOCK_(\d+)%%/g, (match, idx) => {
                    const cb = codeBlocks[parseInt(idx)];
                    const langAttr = cb.lang ? ` class="language-${cb.lang}"` : '';
                    return `<pre><code${langAttr}>${escapeHtml(cb.code)}</code><button class="copy-code-btn">Copy</button></pre>`;
                });
                html = html.replace(/\n/g, '<br>');
                return html;
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function detectAndEnhanceFormatting(content, userQuery) {
                const lower = content.toLowerCase();
                const queryLower = (userQuery || '').toLowerCase();
                let enhanced = content;
                if (content.includes('#') || content.includes('```') || content.includes('|') || content.includes(
                        '- [ ]')) return enhanced;
                const comparisonIndicators = ['vs', 'versus', 'compared to', 'difference between', 'compare',
                    'contrast', 'pros and cons', 'advantages', 'disadvantages'
                ];
                const isComparison = comparisonIndicators.some(ind => queryLower.includes(ind));
                if (isComparison && content.length > 200) enhanced = '## 📊 Comparison\n\n' + enhanced;
                const stepIndicators = ['step', 'how to', 'guide', 'tutorial', 'walkthrough', 'instructions'];
                const isStepByStep = stepIndicators.some(ind => queryLower.includes(ind));
                if (isStepByStep && !content.match(/^\d+\./m)) enhanced = '## 📋 Step-by-Step Guide\n\n' + enhanced;
                if ((queryLower.includes('list') || queryLower.includes('features') || queryLower.includes(
                        'examples')) && !content.includes('- ')) {
                    const lines = content.split('\n').filter(l => l.trim());
                    if (lines.length >= 3 && lines.length <= 15) enhanced = lines.map(l => '- ' + l.trim()).join(
                        '\n');
                }
                return enhanced;
            }

            // RENDER CHAT LIST
            // ═══════════════════════════════════════════
            function renderChatList() {
                const sorted = [...chats].sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return b.updatedAt - a.updatedAt;
                });
                chatList.innerHTML = sorted.map(c => `
                <div class="chat-list-item ${c.id===currentChatId?'active':''}" data-chat-id="${c.id}">
                  <span class="chat-dot"></span>
                  <span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(c.title)}</span>
                  ${c.pinned?'<span style="font-size:0.65rem;">📌</span>':''}
                  <button class="delete-chat-btn" data-delete="${c.id}" title="Delete">×</button>
                </div>`).join('');
                if (sorted.length === 0) {
                    chatList.innerHTML =
                        '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.82rem;">No conversations yet</div>';
                }
            }

            function renderMessages() {
                const chat = getCurrentChat();
                conversation.innerHTML = '';
                welcomeScreen.style.display = 'none';
                if (!chat || chat.messages.length === 0) {
                    welcomeScreen.style.display = 'flex';
                    topbarTitle.textContent = 'New Conversation';
                    return;
                }
                topbarTitle.textContent = chat.title;
                for (const msg of chat.messages) {
                    appendMessageToDOM(msg);
                }
                scrollToBottom();
            }

            function appendMessageToDOM(msg) {
                const el = document.createElement('div');
                el.className = `message ${msg.role}`;
                el.setAttribute('data-msg-id', msg.id || '');
                let content = renderMarkdown(msg.content);
                const metaHtml = msg.modelType ?
                    `<div class="msg-meta"><span>${msg.modelType}</span></div>` : '';
                const timestamp = msg.timestamp ?
                    `<div class="msg-timestamp">${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>` :
                    '';
                let imageHtml = '';
                if (msg.images && msg.images.length > 0) {
                    imageHtml = msg.images.map((img, i) =>
                        `<img src="${img}" class="image-preview-thumb" data-img-index="${i}" style="margin:6px 4px 0 0;" alt="Uploaded image">`
                    ).join('');
                }
                if (msg.filePreview) {
                    imageHtml +=
                        `<div style="margin:6px 0;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:0.78rem;color:var(--accent2);">📎 ${escapeHtml(msg.filePreview)}</div>`;
                }
                el.innerHTML = `
              ${metaHtml}
              ${imageHtml}
              <div class="msg-content">${content}</div>
              ${timestamp}
              <div class="msg-actions">
                <button class="btn-copy-msg" data-content="${escapeHtml(msg.content)}">📋 Copy</button>
                ${msg.role==='assistant'?'<button class="btn-regenerate">🔄 Regenerate</button>':''}
                ${msg.role==='assistant'?'<button class="btn-speak-msg" data-content="'+escapeHtml(msg.content)+'">🔊 Speak</button>':''}
                <button class="btn-delete-msg">🗑</button>
              </div>`;
                conversation.appendChild(el);
                highlightCodeBlocks(el);
                return el;
            }

            function highlightCodeBlocks(el) {
                el.querySelectorAll('pre code').forEach(block => {
                    const lang = block.className.replace('language-', '');
                    if (lang) block.setAttribute('data-lang', lang);
                });
            }

            function scrollToBottom() {
                requestAnimationFrame(() => { conversation.scrollTop = conversation.scrollHeight; });
            }

            function buildSystemContext() {
                let context = '';
                if (memoryItems.length > 0) {
                    const recent = memoryItems.slice(-15);
                    const categorized = {};
                    for (const m of recent) {
                        if (!categorized[m.category]) categorized[m.category] = [];
                        categorized[m.category].push(`${m.key}: ${m.value}`);
                    }
                    context += '## User Memory & Preferences\n';
                    for (const [cat, items] of Object.entries(categorized)) {
                        context += `### ${cat}\n`;
                        context += items.map(i => `- ${i}`).join('\n') + '\n';
                    }
                }
                const enabledTools = Object.entries(activeTools).filter(([_, v]) => v).map(([k]) => k);
                if (enabledTools.length > 0) {
                    context += `\n## Active Tools: ${enabledTools.join(', ')}\n`;
                    if (activeTools['thinking']) context +=
                        '- Thinking Mode: Show reasoning process before final answer.\n';
                    if (activeTools['deep-analysis']) context +=
                        '- Deep Analysis: Provide thorough, multi-layered analysis.\n';
                    if (activeTools['code-interpreter']) context +=
                        '- Code Interpreter: Analyze code, suggest improvements, explain logic.\n';
                    if (activeTools['writing']) context +=
                        '- Writing Assistant: Polish grammar, improve style and clarity.\n';
                    if (activeTools['research']) context +=
                        '- Research Assistant: Provide comprehensive, well-structured research summaries.\n';
                    if (activeTools['translate']) context += '- Translation: Translate content when needed.\n';
                    if (activeTools['ocr']) context += '- OCR: Extract and analyze text from images.\n';
                }
                return context;
            }

            // ═══════════════════════════════════════════
            // STREAMING & API (FULLY WORKING)
            // ═══════════════════════════════════════════
            async function sendMessage(content) {
                if (isGenerating || !content.trim()) return;
                const chat = getCurrentChat();
                if (!chat) return;
                const modelConfig = getEffectiveModelConfig();
                if (!modelConfig || !modelConfig.apiKey || modelConfig.apiKey.includes('YOUR_API_KEY')) {
                    showToast('⚠️ Please configure your API keys in CONFIG.models');
                    return;
                }
                welcomeScreen.style.display = 'none';
                const userMsg = {
                    id: 'msg_' + Date.now(),
                    role: 'user',
                    content: content.trim(),
                    timestamp: Date.now(),
                    modelType: getNovaModeLabel(activeNovaMode),
                    images: pendingImages.length > 0 ? [...pendingImages] : undefined,
                    filePreview: uploadedFiles.length > 0 ? uploadedFiles.map(f => f.name).join(', ') : undefined,
                };
                chat.messages.push(userMsg);
                chat.updatedAt = Date.now();
                if (chat.messages.length === 1 && chat.title === 'New Conversation') {
                    chat.title = content.trim().slice(0, 55) + (content.trim().length > 55 ? '...' : '');
                }
                appendMessageToDOM(userMsg);
                saveState();
                renderChatList();
                scrollToBottom();
                userInput.value = '';
                userInput.style.height = 'auto';
                const sentImages = [...pendingImages];
                const sentFiles = [...uploadedFiles];
                pendingImages = [];
                uploadedFiles = [];
                isGenerating = true;
                sendBtn.disabled = true;
                stopBtn.style.display = 'flex';
                sendBtn.style.display = 'none';
                currentStreamContent = '';
                const thinkingEl = createThinkingIndicator(activeTools['thinking'] ? 'Thinking…' : 'Processing…');
                conversation.appendChild(thinkingEl);
                scrollToBottom();
                abortController = new AbortController();
                const assistantMsgId = 'msg_' + Date.now() + '_assistant';
                const assistantMsg = {
                    id: assistantMsgId,
                    role: 'assistant',
                    content: '',
                    timestamp: Date.now(),
                    modelType: getNovaModeLabel(activeNovaMode),
                };
                chat.messages.push(assistantMsg);
                let streamEl = null;
                try {
                    const messagesForAPI = [];
                    const systemCtx = buildSystemContext();
                    if (systemCtx) messagesForAPI.push({ role: 'system', content: systemCtx });
                    const historyMsgs = chat.messages.filter(m => m.role === 'user' || m.role === 'assistant').slice(
                        -25);
                    for (const m of historyMsgs) {
                        if (m.id === assistantMsgId) continue;
                        const apiMsg = { role: m.role, content: m.content };
                        if (m.images && m.images.length > 0 && m.role === 'user') {
                            const parts = [{ type: 'text', text: m.content }];
                            for (const img of m.images) parts.push({ type: 'image_url', image_url: { url: img } });
                            apiMsg.content = parts;
                        }
                        messagesForAPI.push(apiMsg);
                    }
                    const currentApiMsg = { role: 'user', content: content.trim() };
                    if (sentImages.length > 0) {
                        const parts = [{ type: 'text', text: content.trim() }];
                        for (const img of sentImages) parts.push({ type: 'image_url', image_url: { url: img } });
                        currentApiMsg.content = parts;
                    }
                    messagesForAPI.push(currentApiMsg);
                    if (sentFiles.length > 0) {
                        const fileContexts = sentFiles.map(f =>
                            `[File: ${f.name}]\nContent:\n${f.content.slice(0,4000)}`);
                        messagesForAPI.push({
                            role: 'system',
                            content: 'Uploaded files for analysis:\n\n' + fileContexts.join('\n\n')
                        });
                    }
                    const response = await fetch(CONFIG.endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${modelConfig.apiKey}`,
                            'HTTP-Referer': window.location.origin,
                            'X-Title': 'NOVA AI v1.1',
                        },
                        body: JSON.stringify({
                            model: modelConfig.model,
                            messages: messagesForAPI,
                            stream: true,
                            temperature: settings.temperature,
                            max_tokens: settings.maxTokens,
                        }),
                        signal: abortController.signal,
                    });
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API ${response.status}: ${errText.slice(0,200)}`);
                    }
                    thinkingEl.remove();
                    streamEl = document.createElement('div');
                    streamEl.className = 'message assistant';
                    streamEl.setAttribute('data-msg-id', assistantMsgId);
                    streamEl.innerHTML =
                        `<div class="msg-meta"><span>${getNovaModeLabel(activeNovaMode)}</span></div><div class="msg-content"></div><span class="typing-cursor"></span>`;
                    conversation.appendChild(streamEl);
                    currentStreamMessageEl = streamEl;
                    const contentDiv = streamEl.querySelector('.msg-content');
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || !trimmed.startsWith('data: ')) continue;
                            const data = trimmed.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices?.[0]?.delta?.content;
                                if (delta) {
                                    currentStreamContent += delta;
                                    contentDiv.innerHTML = renderMarkdown(currentStreamContent);
                                    highlightCodeBlocks(streamEl);
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                    const cursorEl = streamEl.querySelector('.typing-cursor');
                    if (cursorEl) cursorEl.remove();
                    const enhanced = detectAndEnhanceFormatting(currentStreamContent, content.trim());
                    if (enhanced !== currentStreamContent) {
                        currentStreamContent = enhanced;
                        contentDiv.innerHTML = renderMarkdown(currentStreamContent);
                        highlightCodeBlocks(streamEl);
                    }
                    assistantMsg.content = currentStreamContent;
                    assistantMsg.timestamp = Date.now();
                    chat.updatedAt = Date.now();
                    addMsgActionsToStreamEl(streamEl, assistantMsg);
                    if (chat.title === 'New Conversation' || chat.messages.filter(m => m.role === 'user').length <=
                        2) {
                        const titleCandidate = currentStreamContent.slice(0, 65).replace(/[#*`\n]/g, ' ').trim();
                        if (titleCandidate.length > 5) chat.title = titleCandidate + (currentStreamContent.length >
                            65 ? '…' : '');
                    }
                } catch (err) {
                    if (thinkingEl.parentNode) thinkingEl.remove();
                    if (err.name === 'AbortError') {
                        assistantMsg.content = currentStreamContent || '(Generation stopped)';
                        if (streamEl) {
                            const cEl = streamEl.querySelector('.typing-cursor');
                            if (cEl) cEl.remove();
                            streamEl.querySelector('.msg-content').innerHTML = renderMarkdown(assistantMsg.content);
                            addMsgActionsToStreamEl(streamEl, assistantMsg);
                        }
                    } else {
                        assistantMsg.content = `❌ **Error:** ${err.message}\n\nPlease try again or check your API configuration.`;
                        if (streamEl) {
                            streamEl.querySelector('.msg-content').innerHTML = renderMarkdown(assistantMsg.content);
                            const cEl = streamEl.querySelector('.typing-cursor');
                            if (cEl) cEl.remove();
                        } else {
                            const errEl = document.createElement('div');
                            errEl.className = 'message assistant';
                            errEl.innerHTML = renderMarkdown(assistantMsg.content);
                            conversation.appendChild(errEl);
                        }
                        showToast('❌ ' + err.message);
                    }
                } finally {
                    isGenerating = false;
                    abortController = null;
                    currentStreamMessageEl = null;
                    currentStreamContent = '';
                    sendBtn.disabled = false;
                    sendBtn.style.display = 'flex';
                    stopBtn.style.display = 'none';
                    saveState();
                    renderChatList();
                    topbarTitle.textContent = chat.title;
                    scrollToBottom();
                }
            }

            function regenerateLast() {
                const chat = getCurrentChat();
                if (!chat || isGenerating) return;
                const lastAsstIdx = chat.messages.map(m => m.role).lastIndexOf('assistant');
                if (lastAsstIdx >= 0) chat.messages.splice(lastAsstIdx, 1);
                const lastUserMsg = [...chat.messages].reverse().find(m => m.role === 'user');
                if (lastUserMsg) {
                    chat.messages = chat.messages.filter(m => m.id !== lastUserMsg.id);
                    renderMessages();
                    saveState();
                    sendMessage(lastUserMsg.content);

            // ═══════════════════════════════════════════
            // FILE & IMAGE HANDLING
            // ═══════════════════════════════════════════
            function handleFiles(files) {
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            pendingImages.push(e.target.result);
                            showToast('🖼 Image added — ' + pendingImages.length + ' image(s) ready');
                        };
                        reader.readAsDataURL(file);
                    } else {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            uploadedFiles.push({
                                name: file.name,
                                type: file.type,
                                size: file.size,
                                content: e.target.result
                            });
                            showToast('📎 File loaded: ' + file.name);
                        };
                        reader.readAsText(file);
                    }
                }
            }

            function pasteFromClipboard(e) {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            pendingImages.push(ev.target.result);
                            showToast('🖼 Image pasted — ' + pendingImages.length + ' image(s) ready');
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            }

            let isRecording = false;
            let recognition = null;

            function initVoice() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { $('#btn-voice').style.display = 'none'; return; }
                recognition = new SR();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                recognition.onresult = function(event) {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) transcript += event.results[i][0]
                        .transcript;
                    userInput.value = transcript;
                    userInput.style.height = 'auto';
                    userInput.style.height = userInput.scrollHeight + 'px';
                    if (event.results[0]?.isFinal) stopRecording();
                };
                recognition.onerror = () => stopRecording();
                recognition.onend = () => stopRecording();
            }

            function startRecording() {
                if (!recognition || isRecording) return;
                isRecording = true;
                $('#btn-voice').classList.add('recording');
                recognition.start();
                showToast('🎤 Listening…');
            }

            function stopRecording() {
                if (!isRecording) return;
                isRecording = false;
                $('#btn-voice').classList.remove('recording');
                if (recognition) try { recognition.stop(); } catch (e) {}
            }

            function speakText(text) {
                if (!window.speechSynthesis) return;
                const cleanText = text.replace(/[#*`\[\]()_~]/g, '').slice(0, 1000);
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.rate = 0.95;
                utterance.pitch = 1;
                utterance.volume = 0.85;
                window.speechSynthesis.speak(utterance);
            }

            function searchAllChats(query) {
                if (!query.trim()) return [];
                const results = [];
                const lq = query.toLowerCase();
                for (const chat of chats) {
                    for (const msg of chat.messages) {
                        if (msg.content.toLowerCase().includes(lq)) {
                            results.push({ chat, msg, chatId: chat.id, msgId: msg.id });
                        }
                    }
                }
                return results;
            }

                    isSidebarOpen ? closeSidebar() : openSidebar();

                    sidebar.classList.add('mobile-open');
                    mobileOverlay.classList.add('active');
                } else {
                    sidebar.classList.remove('collapsed');

                }

            function closeSidebar() {
                isSidebarOpen = false;
                if (window.matchMedia('(max-width:768px)').matches) {
                    sidebar.classList.remove('mobile-open');
                    mobileOverlay.classList.remove('active');
                } else {
                    sidebar.classList.add('collapsed');

                renderChatList();

                if (chats.length <= 1) { showToast('Cannot delete the last conversation'); return; }
                chats = chats.filter(c => c.id !== chatId);
                if (currentChatId === chatId) currentChatId = chats[0]?.id || null;

            // ═══════════════════════════════════════════
            // EVENT WIRING
            // ═══════════════════════════════════════════
            sendBtn.addEventListener('click', () => {
                const content = userInput.value.trim();
                if (content) sendMessage(content);
            });
            stopBtn.addEventListener('click', stopGeneration);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const content = userInput.value.trim();
                    if (content && !isGenerating) sendMessage(content);
                }
            });
            userInput.addEventListener('input', () => {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 180) + 'px';
            });
            document.addEventListener('paste', pasteFromClipboard);
            $('#btn-toggle-sidebar').addEventListener('click', toggleSidebar);
            $('#btn-new-chat-sidebar').addEventListener('click', createNewChat);
            $('#btn-search-chats').addEventListener('click', showSearchModal);
            $('#btn-memory-panel').addEventListener('click', showMemoryModal);
            $('#btn-settings').addEventListener('click', showSettingsModal);
            $('#btn-attach').addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) handleFiles(e.target.files);
                fileInput.value = '';
            });
            $('#btn-voice').addEventListener('click', () => { isRecording ? stopRecording() : startRecording(); });
            novaModeSelector.addEventListener('click', (e) => {
                const btn = e.target.closest('.nova-mode-btn');
                if (!btn) return;
                activeNovaMode = btn.dataset.mode;
                updateModeUI();
                saveState();
                showToast('Mode: ' + getNovaModeLabel(activeNovaMode));
            });
            toolsToggleRow.addEventListener('click', (e) => {
                const chip = e.target.closest('.tool-chip');
                if (!chip) return;
                const tool = chip.dataset.tool;
                activeTools[tool] = !activeTools[tool];
                updateToolsUI();
                saveState();
                showToast((activeTools[tool] ? '✅ ' : '❌ ') + tool.replace(/-/g, ' ') + (activeTools[tool] ?
                    ' enabled' : ' disabled'));
            });
            chatList.addEventListener('click', (e) => {
                const item = e.target.closest('.chat-list-item');
                if (!item) return;
                if (e.target.classList.contains('delete-chat-btn')) {
                    e.stopPropagation();
                    deleteChat(e.target.dataset.delete);
                    return;
                }
                const cId = item.dataset.chatId;
                if (cId && cId !== currentChatId) {
                    currentChatId = cId;
                    renderMessages();
                    renderChatList();
                    if (window.matchMedia('(max-width:768px)').matches) closeSidebar();
                }
            });
            conversation.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-copy-msg')) {
                    navigator.clipboard.writeText(e.target.dataset.content).then(() => showToast('📋 Copied!'));
                }
                if (e.target.classList.contains('btn-regenerate')) regenerateLast();
                if (e.target.classList.contains('btn-speak-msg')) speakText(e.target.dataset.content);
                if (e.target.classList.contains('btn-delete-msg')) {
                    const msgEl = e.target.closest('.message');
                    const msgId = msgEl?.dataset.msgId;
                    const chat = getCurrentChat();
                    if (chat && msgId) {
                        chat.messages = chat.messages.filter(m => m.id !== msgId);
                        chat.updatedAt = Date.now();
                        saveState();
                        renderMessages();
                        renderChatList();
                    }
                }
                if (e.target.classList.contains('copy-code-btn')) {
                    const pre = e.target.closest('pre');
                    const code = pre?.querySelector('code')?.textContent || '';
                    navigator.clipboard.writeText(code).then(() => {
                        e.target.textContent = '✓ Copied!';
                        setTimeout(() => { e.target.textContent = 'Copy'; }, 1500);
                    });
                }
            });
            $('#suggested-prompts').addEventListener('click', (e) => {
                if (e.target.classList.contains('suggested-prompt')) sendMessage(e.target.textContent);
            });
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault();
                    showSearchModal(); }
                if ((e.ctrlKey || e.metaKey) && e.key === '/') { e.preventDefault();
                    userInput.focus(); }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'N') { e.preventDefault();
                    createNewChat(); }
                if (e.key === 'Escape') {
                    if (isGenerating) stopGeneration();
                    const modal = document.querySelector('.modal-overlay');
                    if (modal) modal.remove();
                    if (window.matchMedia('(max-width:768px)').matches && isSidebarOpen) closeSidebar();
                }
            });
            document.addEventListener('dragover', (e) => { e.preventDefault();
                dropZone.classList.add('active'); });
            document.addEventListener('dragleave', (e) => {
                if (e.target === document.body || e.target === dropZone) dropZone.classList.remove('active');
            });
            dropZone.addEventListener('dragover', (e) => e.preventDefault());
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('active');
                if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
            });
            const resizeHandle = $('#sidebar-resize-handle');
            let isResizing = false;
            resizeHandle.addEventListener('mousedown', () => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const w = Math.max(220, Math.min(480, e.clientX));
                settings.sidebarWidth = w;
                document.documentElement.style.setProperty('--sidebar-w', w + 'px');
                sidebar.style.width = w + 'px';
                sidebar.style.minWidth = w + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (isResizing) { isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    saveState(); }
            });
            mobileOverlay.addEventListener('click', closeSidebar);
            let touchStartX = 0;
            document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
            document.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (diff > 70 && touchStartX < 35 && !isSidebarOpen && window.matchMedia('(max-width:768px)')
                    .matches) openSidebar();
                if (diff < -70 && isSidebarOpen && window.matchMedia('(max-width:768px)').matches) closeSidebar();
            });
            window.addEventListener('resize', () => {
                if (window.matchMedia('(max-width:768px)').matches) {
                    sidebar.classList.remove('collapsed');
                    document.documentElement.style.setProperty('--sidebar-w', '290px');
                    if (!isSidebarOpen) { sidebar.classList.remove('mobile-open');
                        mobileOverlay.classList.remove('active'); }
                } else {
                    sidebar.classList.remove('mobile-open');
                    mobileOverlay.classList.remove('active');
                    if (!isSidebarOpen) { sidebar.classList.add('collapsed');
                        document.documentElement.style.setProperty('--sidebar-w', '0px'); } else { sidebar.classList
                            .remove('collapsed');
                        document.documentElement.style.setProperty('--sidebar-w', settings.sidebarWidth + 'px'); }
                }
            });

            // ═══════════════════════════════════════════
            // INIT
            // ═══════════════════════════════════════════
            function init() {
                loadState();
                applyAllSettings();
                if (!isSidebarOpen && !window.matchMedia('(max-width:768px)').matches) {
                    sidebar.classList.add('collapsed');
                    document.documentElement.style.setProperty('--sidebar-w', '0px');
                }
                if (window.matchMedia('(max-width:768px)').matches) {
                    sidebar.classList.remove('mobile-open');
                    mobileOverlay.classList.remove('active');
                    isSidebarOpen = false;
                }
                updateModeUI();
                updateToolsUI();
                renderChatList();
                renderMessages();
                initParticles();
                initVoice();
                userInput.focus();
                console.log('🚀 NOVA AI v1.1 ready — All buttons functional');
                console.log('Configure API keys in CONFIG.models');
            }
            init();
        })();
    </script>
</body>
</html>
