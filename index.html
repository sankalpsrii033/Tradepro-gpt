<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade GPT Pro - Level 4 AI Terminal</title>

<!-- MARKED JS (Markdown Renderer) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #070b14;
    color: white;
}

/* HEADER */
header {
    background: #111827;
    padding: 16px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* CHAT AREA */
#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 12px;
    border-radius: 10px;
    max-width: 80%;
    line-height: 1.4;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.ai {
    background: #111827;
    align-self: flex-start;
}

/* INPUT BAR */
#inputBar {
    display: flex;
    padding: 10px;
    gap: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    font-weight: bold;
    cursor: pointer;
}

/* SETTINGS BUTTON */
#settingsBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #f59e0b;
    color: black;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: #111827;
    width: 400px;
    margin: 10% auto;
    padding: 20px;
    border-radius: 12px;
}

.modal input, .modal select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}
</style>
</head>

<body>

<header>🔥 Trade GPT Pro - Level 4 AI Terminal</header>

<button id="settingsBtn" onclick="openSettings()">⚙ Settings</button>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputBar">
<input id="userInput" placeholder="Ask Trade GPT Pro AI..." />
<button onclick="sendMessage()">Send</button>
</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settingsModal">
<div class="modal-content">
<span class="close" onclick="closeSettings()">✖</span>

<h3>⚙ Settings</h3>

<input id="apiKey" type="password" placeholder="OpenRouter API Key">

<select id="model">
<option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free Default)</option>
<option value="openai/gpt-4o-mini">GPT-4o Mini</option>
<option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
<option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1</option>
</select>

<button onclick="saveSettings()">Save Settings</button>
</div>
</div>

<script>

// --------------------
// INIT STORAGE
// --------------------
let chatHistory = JSON.parse(localStorage.getItem("chat_history") || "[]");

document.getElementById("apiKey").value = localStorage.getItem("api_key") || "";
document.getElementById("model").value = localStorage.getItem("model") || "deepseek/deepseek-r1:free";

// Load old chat
window.onload = () => {
    chatHistory.forEach(m => renderMessage(m.role, m.content));
};

// --------------------
// SETTINGS
// --------------------
function openSettings(){
    document.getElementById("settingsModal").style.display = "block";
}

function closeSettings(){
    document.getElementById("settingsModal").style.display = "none";
}

function saveSettings(){
    localStorage.setItem("api_key", document.getElementById("apiKey").value);
    localStorage.setItem("model", document.getElementById("model").value);
    closeSettings();
}

// --------------------
// RENDER MESSAGE
// --------------------
function renderMessage(role, content){
    let div = document.createElement("div");
    div.classList.add("msg");
    div.classList.add(role === "user" ? "user" : "ai");

    if(role === "ai"){
        div.innerHTML = marked.parse(content);
    } else {
        div.innerText = content;
    }

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

// --------------------
// SAVE CHAT
// --------------------
function saveChat(role, content){
    chatHistory.push({role, content});
    localStorage.setItem("chat_history", JSON.stringify(chatHistory));
}

// --------------------
// OPENROUTER CALL
// --------------------
async function callAI(message){

    const key = localStorage.getItem("api_key");
    const model = localStorage.getItem("model") || "deepseek/deepseek-r1:free";

    if(!key){
        return "❌ **Error:** connect to OpenRouter API";
    }

    try{
        let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + key,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: model,
                messages: [
                    {
                        role: "system",
                        content: "You are Trade GPT Pro AI. You analyze markets using structure, liquidity, MSS, FVG, VWAP, volume and risk. Always respond in structured markdown format."
                    },
                    {
                        role: "user",
                        content: message
                    }
                ]
            })
        });

        let data = await res.json();

        if(data.error){
            return "❌ **Error:** connect to OpenRouter API";
        }

        return data.choices[0].message.content;

    } catch (e) {
        return "❌ **Error:** connect to OpenRouter API";
    }
}

// --------------------
// SEND MESSAGE
// --------------------
async function sendMessage(){

    let input = document.getElementById("userInput");
    let text = input.value;

    if(!text) return;

    renderMessage("user", text);
    saveChat("user", text);

    input.value = "";

    renderMessage("ai", "_Thinking..._");

    let response = await callAI(text);

    // remove last "thinking"
    document.getElementById("chat").lastChild.remove();

    renderMessage("ai", response);
    saveChat("ai", response);
}

</script>

</body>
</html>
