<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade GPT Pro - Level 2 Terminal</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

header {
    background:#111827;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
}

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:15px;
    padding:15px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

input, select, button {
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:6px;
}

button {
    background:#22c55e;
    font-weight:bold;
    cursor:pointer;
}

button:hover { background:#16a34a; }

.engine {
    display:grid;
    grid-template-columns:1fr 1fr;
    font-size:12px;
    gap:6px;
}

.output {
    background:black;
    padding:15px;
    height:420px;
    overflow:auto;
    white-space:pre-line;
    border-radius:10px;
}

.badge {
    padding:5px 10px;
    border-radius:6px;
    display:inline-block;
    font-size:12px;
}
.green{background:#16a34a;}
.yellow{background:#ca8a04;}
.red{background:#dc2626;}

iframe {
    width:100%;
    height:400px;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 TRADE GPT PRO - LEVEL 2 TERMINAL</header>

<div class="grid">

<!-- INPUT PANEL -->
<div class="card">
<h3>📌 Trade Input Engine</h3>

<input id="stock" placeholder="Stock (e.g. NVDA)">
<input id="capital" placeholder="Capital (₹)">
<input id="risk" placeholder="Risk %">

<select id="mode">
<option value="A++">A++ Deep Institutional Scan</option>
<option value="A+">A+ Balanced Scan</option>
<option value="B">B Quick Scan</option>
</select>

<button onclick="runEngine()">RUN 15 ENGINE ANALYSIS</button>

<hr>

<h3>📡 API PANEL (Optional)</h3>
<input id="apiKey" placeholder="OpenAI API Key (optional)">
<input id="dataKey" placeholder="Market Data API Key (optional)">

</div>

<!-- ENGINE PANEL -->
<div class="card">
<h3>🧠 15 ENGINE STATUS</h3>
<div class="engine">
<label>✔ Data Engine</label>
<label>✔ Market Structure</label>
<label>✔ Liquidity Engine</label>
<label>✔ Sweep Engine</label>
<label>✔ MSS Engine</label>
<label>✔ FVG Engine</label>
<label>✔ VWAP Engine</label>
<label>✔ Volume Engine</label>
<label>✔ Trend Engine</label>
<label>✔ News Engine</label>
<label>✔ Risk Engine</label>
<label>✔ Confluence Engine</label>
<label>✔ AI Debate Engine</label>
<label>✔ Execution Engine</label>
<label>✔ Report Engine</label>
</div>
</div>

<!-- OUTPUT -->
<div class="card" style="grid-column: span 2;">
<h3>📊 INSTITUTIONAL REPORT OUTPUT</h3>
<div class="output" id="output">Waiting for analysis...</div>
</div>

<!-- CHART -->
<div class="card" style="grid-column: span 2;">
<h3>📈 LIVE CHART (TradingView)</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=15&theme=dark"></iframe>
</div>

</div>

<script>

// ------------------------------
// RANDOM ENGINE SIMULATION CORE
// ------------------------------
function r(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

// ------------------------------
// LOCAL STORAGE HISTORY
// ------------------------------
function saveHistory(report){
    let history = JSON.parse(localStorage.getItem("trade_history") || "[]");
    history.push({time:new Date(), report});
    localStorage.setItem("trade_history", JSON.stringify(history));
}

// ------------------------------
// GPT SIMULATION LAYER
// ------------------------------
async function fakeAIAnalysis(stock, mode){
    let depth = mode === "A++" ? 10 : mode === "A+" ? 7 : 4;

    return `
AI DEEP LAYER ANALYSIS (${mode})

Bias Detection: ${r(40,90)}%
Liquidity Map Strength: ${r(5,10)}/10
Institutional Activity: ${r(4,10)}/10
Order Flow Pressure: ${r(3,10)}/10

Summary:
${stock} is showing ${r(1,3)==1?"accumulation":r(1,3)==2?"manipulation":"distribution"} phase.

`;
}

// ------------------------------
// MAIN ENGINE
// ------------------------------
async function runEngine(){

let stock = document.getElementById("stock").value;
let capital = document.getElementById("capital").value;
let risk = document.getElementById("risk").value;
let mode = document.getElementById("mode").value;

let confluence = r(45,95);

let aiLayer = await fakeAIAnalysis(stock, mode);

let report = `
🔥 TRADE GPT PRO - LEVEL 2 REPORT
=================================

📌 STOCK: ${stock}
💰 CAPITAL: ₹${capital}
⚠️ RISK: ${risk}
🧠 MODE: ${mode}

---------------------------------
📊 ENGINE SCORES
---------------------------------

Market Structure: ${r(6,10)}/10
Liquidity Engine: ${r(5,10)}/10
Sweep Engine: ${r(4,10)}/10
MSS Engine: ${r(5,10)}/10
FVG Engine: ${r(4,10)}/10
VWAP Engine: ${r(4,10)}/10
Volume Engine: ${r(3,10)}/10
Trend Engine: ${r(5,10)}/10

---------------------------------
🧠 AI LAYER
---------------------------------

${aiLayer}

---------------------------------
📊 CONFLUENCE SCORE
---------------------------------
${confluence}/100

${
confluence > 80 ? "🟢 A++ INSTITUTIONAL SETUP DETECTED" :
confluence > 65 ? "🟡 A+ SETUP DETECTED" :
confluence > 50 ? "🟠 B GRADE QUICK SCAN" :
"🔴 NO TRADE ZONE"
}

---------------------------------
📌 TRADE PLAN (SIMULATED)
---------------------------------

Entry Zone: ${r(100,200)}
Stop Loss: ${r(80,99)}
Target 1: ${r(210,260)}
Target 2: ${r(270,340)}

Risk Model: ${risk}% capital exposure

---------------------------------
💾 SAVED TO HISTORY
---------------------------------
Yes

---------------------------------
⚠️ DISCLAIMER
---------------------------------
Simulation system only.
No financial advice.
Built for Trade GPT Pro architecture.
`;

document.getElementById("output").innerText = report;

saveHistory(report);

}

</script>

</body>
</html>
