<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade GPT Pro - Level 3 AI Terminal</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#070b14;
    color:white;
}

header{
    background:#111827;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:6px;
}

button{
    background:#22c55e;
    font-weight:bold;
    cursor:pointer;
}

button:hover{background:#16a34a;}

.output{
    background:black;
    padding:15px;
    height:420px;
    overflow:auto;
    white-space:pre-line;
    border-radius:10px;
}

.engine{
    font-size:12px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
}

.red{color:#ef4444;}
.green{color:#22c55e;}
.yellow{color:#facc15;}

iframe{
    width:100%;
    height:400px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<header>🔥 TRADE GPT PRO - LEVEL 3 OPENROUTER TERMINAL</header>

<div class="grid">

<!-- INPUT -->
<div class="card">
<h3>📌 Trade Input</h3>

<input id="stock" placeholder="Stock (e.g. NVDA)">
<input id="capital" placeholder="Capital (₹)">
<input id="risk" placeholder="Risk %">

<select id="mode">
<option value="A++">A++ Institutional Deep AI</option>
<option value="A+">A+ Balanced AI</option>
<option value="B">B Quick Scan</option>
</select>

<hr>

<h3>🔌 OPENROUTER API PANEL</h3>

<input id="apiKey" placeholder="Enter OpenRouter API Key">
<select id="model">
<option value="openai/gpt-4o-mini">GPT-4o Mini</option>
<option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
<option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1</option>
</select>

<button onclick="testConnection()">TEST API CONNECTION</button>

</div>

<!-- ENGINE -->
<div class="card">
<h3>🧠 15 ENGINE SYSTEM</h3>

<div class="engine">
<label>✔ Data Engine</label>
<label>✔ Market Structure</label>
<label>✔ Liquidity Engine</label>
<label>✔ Sweep Engine</label>
<label>✔ MSS Engine</label>
<label>✔ FVG Engine</label>
<label>✔ VWAP Engine</label>
<label>✔ Volume Engine</label>
<label>✔ Trend Engine</label>
<label>✔ News Engine</label>
<label>✔ Risk Engine</label>
<label>✔ Confluence Engine</label>
<label>✔ AI Debate Engine</label>
<label>✔ Execution Engine</label>
<label>✔ Report Engine</label>
</div>
</div>

<!-- OUTPUT -->
<div class="card" style="grid-column:span 2;">
<h3>📊 AI REPORT OUTPUT</h3>
<div class="output" id="output">Waiting for analysis...</div>
<button onclick="runAnalysis()">RUN FULL AI ANALYSIS</button>
</div>

<!-- CHART -->
<div class="card" style="grid-column:span 2;">
<h3>📈 LIVE CHART</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=15&theme=dark"></iframe>
</div>

</div>

<script>

// ----------------------
// RANDOM ENGINE (backup)
// ----------------------
function r(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

// ----------------------
// API TEST
// ----------------------
async function testConnection(){
    const key = document.getElementById("apiKey").value;

    if(!key){
        document.getElementById("output").innerText =
        "❌ Error: connect to OpenRouter API";
        return;
    }

    document.getElementById("output").innerText =
    "🔌 Testing connection to OpenRouter...";

    try{
        let res = await fetch("https://openrouter.ai/api/v1/models", {
            headers:{
                "Authorization":"Bearer " + key
            }
        });

        if(res.ok){
            document.getElementById("output").innerText =
            "✅ OpenRouter API Connected Successfully";
        }else{
            document.getElementById("output").innerText =
            "❌ Error: connect to OpenRouter API";
        }
    }catch(e){
        document.getElementById("output").innerText =
        "❌ Error: connect to OpenRouter API";
    }
}

// ----------------------
// SAVE HISTORY
// ----------------------
function saveHistory(data){
    let h = JSON.parse(localStorage.getItem("tg_history")||"[]");
    h.push({time:new Date(), data});
    localStorage.setItem("tg_history", JSON.stringify(h));
}

// ----------------------
// OPENROUTER AI CALL
// ----------------------
async function callAI(prompt){

    const key = document.getElementById("apiKey").value;
    const model = document.getElementById("model").value;

    if(!key){
        return "❌ Error: connect to OpenRouter API";
    }

    try{
        let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method:"POST",
            headers:{
                "Authorization":"Bearer " + key,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:model,
                messages:[
                    {
                        role:"system",
                        content:"You are Trade GPT Pro AI. You analyze markets using structure, liquidity, MSS, FVG, VWAP, volume, risk and confluence scoring. Always respond in structured trading report format."
                    },
                    {
                        role:"user",
                        content:prompt
                    }
                ]
            })
        });

        let data = await res.json();

        if(data.error){
            return "❌ Error: connect to OpenRouter API";
        }

        return data.choices[0].message.content;

    }catch(e){
        return "❌ Error: connect to OpenRouter API";
    }
}

// ----------------------
// MAIN ENGINE
// ----------------------
async function runAnalysis(){

let stock = document.getElementById("stock").value;
let capital = document.getElementById("capital").value;
let risk = document.getElementById("risk").value;
let mode = document.getElementById("mode").value;

document.getElementById("output").innerText =
"🧠 Running AI analysis...";

let prompt = `
Analyze stock: ${stock}

Capital: ₹${capital}
Risk: ${risk}
Mode: ${mode}

Use Trade GPT Pro 15 engine system:
- Market Structure
- Liquidity
- Sweep
- MSS
- FVG
- VWAP
- Volume
- Trend Alignment
- Risk Management

Give:
1. Confluence Score /100
2. A+/A++/B classification
3. Entry, SL, Targets
4. Institutional explanation
5. Risk notes
`;

let result = await callAI(prompt);

document.getElementById("output").innerText = result;

saveHistory(result);

}

</script>

</body>
</html>
